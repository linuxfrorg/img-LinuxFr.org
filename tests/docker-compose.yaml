---
version: "3.8"

services:

  linuxfr.org-img:
    build:
      context: ..
    environment:
      REDIS: "redis:6379/0"
      CACHE: "/cache"
      ADDR: "0.0.0.0:8000"
    depends_on:
      - redis
      - nginx
    volumes:
      - ./cache-img:/cache
    ports:
      - "8000:8000"

  redis:
    image: redis:5
    volumes:
      - data-redis:/data
    ports:
      - "16379:6379"

  nginx:
    image: nginx:1.25.4
    volumes:
      - ./data-nginx:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  data-redis:
    driver: local
